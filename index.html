<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="style.css" />
    <link
      rel="icon"
      href="img/6_salsa_bottle/2_salsa_bottle_on_ground.png"
      type="image/x-icon"
    />
    <title>El Pollo Locco</title>
    <script src="models/drawable-objekt.class.js"></script>
    <script src="models/moveable-objekt.class.js"></script>
    <script src="models/status-bar.class.js"></script>
    <script src="models/statusbar-coins.class.js"></script>
    <script src="models/statusbar-hitpoints.class.js"></script>
    <script src="models/statusbar-salsabottle.class.js"></script>
    <script src="models/statusbar-endboss.class.js"></script>
    <script src="models/character.class.js"></script>
    <script src="models/chicken.class.js"></script>
    <script src="models/chicken-small.class.js"></script>
    <script src="models/cloud.class.js"></script>
    <script src="models/background-objekt.class.js"></script>
    <script src="models/keyboard.class.js"></script>
    <script src="models/level.class.js"></script>
    <script src="models/endboss-level1.class.js"></script>
    <script src="models/throwable-objekt.class.js"></script>
    <script src="models/world.class.js"></script>
    <script src="models/collectables.class.js"></script>
    <script src="models/coin.class.js"></script>
    <script src="models/salsa-bottle.class.js"></script>
    <script src="levels/level1.js"></script>
    <script src="models/audio-hub.class.js"></script>
  </head>

  <body>
    <h1>El Pollo Locco</h1>

    <div id="portraitOverlay">
      <div id="portraitContent">
        <div id="rotateIcon">&#8635;</div>
        <p id="portraitTitle">Rotate Your Device</p>
        <p id="portraitSub">
          Please switch to landscape mode to play El Pollo Locco.
        </p>
      </div>
    </div>

    <div id="gameContainer">
      <canvas id="gameCanvas" width="720" height="480"></canvas>
      <button id="muteButton" class="game-btn">🔊 Mute</button>
      <button id="startButton" class="game-btn">Start Game</button>
      <button id="settingsButton" class="game-btn">Controls</button>
      <button id="tryAgainButton" class="game-btn">Menu</button>
      <button id="fullscreenButton"></button>
    </div>

    <div id="mobilHub">
      <button id="btnLeft">◀</button>
      <button id="btnRight">▶</button>
      <button id="btnJump">⬆</button>
      <button id="btnThrow">🍶</button>
    </div>

<div id="settingsOverlay">
      <div id="settingsModal">
        <h2>Controls</h2>
        <div class="controls-grid">
          <div class="control-row">
            <span class="key">← →</span>
            <span class="desc">Move left / right</span>
          </div>
          <div class="control-row">
            <span class="key">Space / ↑</span>
            <span class="desc">Jump</span>
          </div>
          <div class="control-row">
            <span class="key">D</span>
            <span class="desc">Throw salsa bottle</span>
          </div>
          <div class="control-row">
            <span class="key">Jump on enemy</span>
            <span class="desc">Kill chicken</span>
          </div>
          <div class="control-row">
            <span class="key">🪙</span>
            <span class="desc">Collect coins</span>
          </div>
          <div class="control-row">
            <span class="key">🍶</span>
            <span class="desc">Collect salsa bottles</span>
          </div>
        </div>
        <button id="closeSettings" class="game-btn">Close</button>
      </div>
    </div>

    <footer id="pageFooter">
      <a id="impressumLink" href="imprint/imprint.html">Imprint</a>
    </footer>

    <script src="js/game.js"></script>
  </body>
</html>
